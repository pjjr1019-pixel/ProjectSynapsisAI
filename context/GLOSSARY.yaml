terms:
  task: "A user-intent unit that the runtime can plan, execute, verify, and audit."
  step: "One planned action inside a task or workflow."
  skill: "A named capability implementation that accepts typed input and returns typed output."
  skill_registry: "The in-memory catalog that registers skill definitions and resolves them by id or capability."
  execution_context: "The immutable metadata bundle for one run, including agent id, task id, job id, user id, and environment hints."
  execution_attempt: "One try to run a step or task under a specific execution context and policy decision."
  observation_snapshot: "Structured evidence captured during or after execution so verification can compare expected and observed state."
  verification_report: "The typed outcome of checking execution results against expectations and policy."
  policy_decision: "The allow, block, or escalate choice made before side effects occur, plus the reason and metadata."
  audit_event: "An append-only record of who did what, when, in which stage, and for which task or job."
  runtime_job: "The task-level execution instance that tracks status, step ids, timestamps, result, and error state."
  runtime_checkpoint: "A serializable snapshot of job state used for debugging, recovery, or replay."
  capability: "A user-facing action family or skill family that the system can reason about and expose."
  side_effect_classification: "A label for how much state an action can read or change, such as none, read, write, or external."
  risk_level: "A coarse safety label that communicates how much approval, review, or escalation a change needs."
  entry_point: "The first callable boundary into a subsystem or process, such as an Electron main-process handler or a runtime run function."
  adapter: "A boundary object that translates between repo contracts and a platform-specific implementation."
