        // Horizons / Electron
        'electron':       { name: 'Horizons AI (Electron)', tip: 'This IS Horizons. Electron is the framework it runs on — every window you see is an Electron process.' },
        'horizons':       { name: 'Horizons AI', tip: 'Horizons Task Manager process.' },

        // Development
        'code':           { name: 'VS Code', tip: 'Visual Studio Code editor. Multiple "Code" processes are normal — each tab/extension gets its own for safety.' },
        'node':           { name: 'Node.js', tip: 'JavaScript runtime. Horizons\' server side runs on Node, so you\'ll see several of these.' },

        // AI
        'claude':         { name: 'Claude AI', tip: 'The Claude AI model process. This is the Horizons AI brain running locally on your machine.' },
        'ollama':         { name: 'Ollama', tip: 'Runs local AI models on your GPU/CPU. Horizons uses it when Local LLM mode is on.' },
        'lmstudio':       { name: 'LM Studio', tip: 'Another local AI model runner. Horizons can connect to it as a provider.' },

        // Browsers
        'chrome':         { name: 'Google Chrome', tip: 'Chrome browser. Each tab runs in its own process — that\'s normal and intentional for stability.' },
        'msedge':         { name: 'Microsoft Edge', tip: 'Edge browser. Like Chrome, each tab gets its own process.' },
        'firefox':        { name: 'Firefox', tip: 'Firefox browser.' },
        'brave':          { name: 'Brave Browser', tip: 'Privacy-focused browser built on Chromium.' },

        // Common apps
        'discord':        { name: 'Discord', tip: 'Discord messaging app. Uses Electron, so it shows several processes.' },
        'slack':          { name: 'Slack', tip: 'Slack messaging app.' },
        'spotify':        { name: 'Spotify', tip: 'Spotify music player.' },
        'steam':          { name: 'Steam', tip: 'Steam game launcher and store.' },
        'teams':          { name: 'Microsoft Teams', tip: 'Microsoft Teams app for meetings and messaging.' },
        'zoom':           { name: 'Zoom', tip: 'Zoom video meetings app.' },
        'onedrive':       { name: 'OneDrive', tip: 'Microsoft OneDrive — keeps your files synced to the cloud in the background.' },
        'dropbox':        { name: 'Dropbox', tip: 'Dropbox file sync service — runs in the background.' },
        'antimalware':    { name: 'Windows Defender', tip: 'Windows security scanning in the background. Normal to see CPU spikes briefly.' },
        'msmpeng':        { name: 'Windows Defender', tip: 'Windows Defender antivirus engine. Spikes during scans, otherwise quiet.' },
        'securityhealthservice': { name: 'Security Health', tip: 'Reports your PC\'s security status to Windows Security Center.' },
        'nvcontainer':    { name: 'NVIDIA Container', tip: 'NVIDIA GPU driver service — needed for your graphics card to work.' },
        'nvdisplay':      { name: 'NVIDIA Display', tip: 'NVIDIA display driver process.' },
        'amdow':          { name: 'AMD Driver', tip: 'AMD graphics card driver process.' },
        'igfxem':         { name: 'Intel Graphics', tip: 'Intel integrated graphics driver.' },
        'conhost':        { name: 'Console Host', tip: 'Hosts command prompt and PowerShell windows. Each terminal you open gets one.' },
        'powershell':     { name: 'PowerShell', tip: 'Windows command shell. Used by scripts and automation tools.' },
        'cmd':            { name: 'Command Prompt', tip: 'Classic Windows command line.' },
        'wsl':            { name: 'Windows Subsystem for Linux', tip: 'Runs Linux programs on Windows without a virtual machine.' },
        'python':         { name: 'Python', tip: 'Python programming runtime. Often used by tools and scripts.' },
        'git':            { name: 'Git', tip: 'Version control tool. Usually runs briefly then exits.' },
      };

      // ── Button/badge tooltip map ─────────────────────────────────────────────
      const BTN_TIPS = new Map([
        ['run now',       'Run this workflow right now, without waiting for its scheduled time.'],
        ['configure',     'This workflow needs some setup before it can run. Click to fill in the required info.'],
        ['pause',         'Temporarily stop this workflow. It won\'t run until you click Resume.'],
        ['resume',        'Turn this workflow back on so it runs on its schedule again.'],
        ['disable',       'Turn this workflow off completely.'],
        ['details',       'See the full settings, history, and schedule for this workflow.'],
        ['armed',         'This workflow is active and will run automatically on schedule.'],
        ['scheduled',     'This workflow has a run time set and is waiting for it.'],
        ['scan',          'Scan all running processes and refresh the list with live data.'],
        ['optimize',      'Ask the AI to look for safe ways to free up CPU or memory right now.'],
        ['pause auto',    'Stop the AI from automatically making changes. It will still watch and suggest — just won\'t act.'],
        ['efficiency mode', 'Lowers this process\'s CPU priority so it runs quieter without closing it.'],
        ['end task',      'Close this program. Unsaved work may be lost.'],
        ['end process tree', 'Close this program AND everything it launched. Use carefully.'],
        ['open file location', 'Open the folder on your computer where this program lives.'],
        ['search online', 'Search the web for this process name to learn what it does.'],
        ['approvals',     'Actions the AI wants to take but needs your permission first.'],
        ['pc',            'Shows all running processes, CPU, RAM, and GPU usage on your computer.'],
        ['ai',            'Shows what the Horizons AI system is doing right now — workers, models, crawlers.'],
        ['workflows',     'Automated tasks that run on a schedule — news, memory cleanup, daily reports, etc.'],
        ['0 hot',         'No processes are currently spiking CPU or memory above normal.'],
        ['high',          'System pressure is HIGH — something is using a lot of resources.'],
        ['ai idle',       'The AI is not actively doing anything right now.'],
        ['processes',     'View all running programs and background tasks on your PC.'],
        ['services',      'View Windows background services — system components that run without a visible window.'],
      ]);

      // ── Tooltip DOM ──────────────────────────────────────────────────────────
      const tipEl  = document.getElementById('hz-tip');
      let curAnchor = null;

      function show(anchor, html) {
        if (curAnchor === anchor) return;
        curAnchor = anchor;
        tipEl.innerHTML = html;
        tipEl.classList.add('hz-visible');
        reposition(anchor);
      }
      function hide() {
        curAnchor = null;
        tipEl.classList.remove('hz-visible');
      }
      function reposition(anchor) {
        const r  = anchor.getBoundingClientRect();
        const W  = 272, GAP = 8;
        let left = Math.max(10, Math.min(r.left, window.innerWidth - W - 10));
        let top  = r.bottom + GAP;
        if (top + 100 > window.innerHeight - 10) {
          top = r.top - GAP - tipEl.offsetHeight;
          if (top < 10) top = r.bottom + GAP;
        }
        tipEl.style.left = left + 'px';
        tipEl.style.top  = top  + 'px';
      }

      function attach(el, htmlFn) {
        if (el._hzAttached) return;
        el._hzAttached = true;
        el.addEventListener('mouseenter', function () { show(el, htmlFn()); });
        el.addEventListener('mouseleave', hide);
        el.addEventListener('focus',      function () { show(el, htmlFn()); });
        el.addEventListener('blur',       hide);
      }

      // ── Process row logic ────────────────────────────────────────────────────
      function getRowName(row) {
        // The name is in the first deeply-nested div with fontSize 12.75
        // Simpler: grab the first text-heavy child div
        const divs = row.querySelectorAll('div');
        for (const d of divs) {
          const txt = (d.textContent || '').trim();
          // Name div: short-ish, has no sub-divs with significant text, is the title
          if (txt && txt.length < 80 && d.children.length === 0) {
            return txt;
          }
        }
        return '';
      }

      function getRowNameAndSubtitle(row) {
        const textDivs = [];
        const walk = (el) => {
          for (const child of el.children) {
            if (child.children.length === 0) {
              const t = (child.textContent || '').trim();
              if (t) textDivs.push(t);
            } else {
              walk(child);
            }
          }
        };
        walk(row);
        return { name: textDivs[0] || '', subtitle: textDivs[1] || '' };
      }

      function processKey(name) {
        // Strip (PID) suffix, lowercase, get first word
        return name.replace(/\s*\(\d+\)\s*$/, '').toLowerCase().split(/[\s._-]/)[0];
      }

      function buildProcessTip(name, subtitle) {
        const key  = processKey(name);
        const info = PROCESS_TIPS[key];

        // Check if this is an AI worker row (subtitle text)
        const sub = (subtitle || '').toLowerCase();
        if (sub === 'ai worker') {
          const aiKey = name.toLowerCase().trim();
          const aiTip = AI_WORKERS[aiKey];
          if (aiTip) {
            return `<span class="hz-name">${name}</span>${aiTip}`;
          }
          return `<span class="hz-name">${name} — AI Worker</span>An internal Horizons AI component that handles a specific part of the system.`;
        }

        if (info) {
          return `<span class="hz-name">${info.name}</span>${info.tip}`;
        }

        // Fallback: show the name and a generic message
        if (sub === 'protected group') {
          return `<span class="hz-name">${name}</span>A protected system process that Horizons will not automatically modify. Safe to monitor but not recommended to close.`;
        }
        if (sub === 'live process group') {
          return `<span class="hz-name">${name}</span>A running program on your computer. Horizons is tracking its resource usage.`;
        }
        return null; // no tip for unknown processes
      }

      function tagRow(row) {
        if (row._hzAttached) return;
        const { name, subtitle } = getRowNameAndSubtitle(row);
        if (!name) return;

        const html = buildProcessTip(name, subtitle);
        if (!html) return;

        attach(row, () => html);
      }

      // ── Button/badge logic ───────────────────────────────────────────────────
      function getLeafText(el) {
        let t = '';
        for (const n of el.childNodes) {
          if (n.nodeType === 3) t += n.textContent;
        }
        return t.trim().toLowerCase() || el.textContent.trim().toLowerCase();
      }

      function tagButton(el) {
        if (el._hzAttached) return;
        const txt = getLeafText(el);
        if (!txt || txt.length > 60) return;
        const tip = BTN_TIPS.get(txt);
        if (!tip) return;
        attach(el, () => tip);
      }

      // ── Scanner ──────────────────────────────────────────────────────────────
      function scan(root) {
        const el = root.querySelectorAll ? root : document;
        // Process/AI worker rows
        for (const row of el.querySelectorAll('[data-tm-row]')) tagRow(row);
        // Buttons and chips
        for (const btn of el.querySelectorAll('button, [role="button"], span, div')) tagButton(btn);
      }

      // ── MutationObserver ─────────────────────────────────────────────────────
      let pending = false;
      const observer = new MutationObserver(function (mutations) {
        if (pending) return;
        pending = true;
        requestAnimationFrame(function () {
          pending = false;
          for (const m of mutations) {
            for (const node of m.addedNodes) {
              if (node.nodeType === 1) scan(node);
            }
          }
        });
      });

      window.addEventListener('scroll', function () {
        if (curAnchor) reposition(curAnchor);
      }, true);
      window.addEventListener('resize', hide);

      function start() {
        observer.observe(document.body, { childList: true, subtree: true });
        scan(document.body);
        setTimeout(() => scan(document.body), 800);
        setTimeout(() => scan(document.body), 2500);
      }

      if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', start);
      } else {
        start();
      }
    })();
    </script>

    <!-- ── Row + metric card enhancer ──────────────────────────────────────
         Adds semantic data-attributes to process rows and metric cards so
         the CSS design system can target them with proper typography and
         interaction styles — without touching any React-managed state.
    ──────────────────────────────────────────────────────────────────────── -->
    <script>
    (function () {
      'use strict';

      // ── Process row enhancer ─────────────────────────────────────────────
      function enhanceRow(row) {
        if (row._hzRowEnhanced) return;
        row._hzRowEnhanced = true;
        const kids = Array.from(row.children);
        // Icon span — first direct child
        if (kids[0] && (kids[0].tagName === 'SPAN' || kids[0].tagName === 'DIV') && kids[0].children.length === 0) {
          kids[0].setAttribute('data-hz-row-icon', '');
        }
        // Info column — second direct child (div containing name + subtitle)
        if (kids[1] && kids[1].tagName === 'DIV') {
          const infoDivs = kids[1].querySelectorAll('div');
          // First leaf-ish div is the process name
          if (infoDivs[0] && !infoDivs[0].hasAttribute('data-hz-process-name')) {
            infoDivs[0].setAttribute('data-hz-process-name', '');
          }
          // Second leaf div is the subtitle/role
          if (infoDivs[1] && !infoDivs[1].hasAttribute('data-hz-process-meta')) {
            infoDivs[1].setAttribute('data-hz-process-meta', '');
          }
        }
        // Metric column — third direct child
        if (kids[2] && !kids[2].hasAttribute('data-hz-process-metric')) {
          kids[2].setAttribute('data-hz-process-metric', '');
        }
      }

      // ── Metric card enhancer ─────────────────────────────────────────────
      // The 3 top metric cards (CPU/GPU/Memory) are flex children inside the
      // metric strip. We identify them heuristically by their large numeric child.
      function enhanceMetricCard(el) {
        if (el._hzCardEnhanced) return;
        // Look for a large-font numeric value inside (metric cards have fontSize >= 22)
        const divs = el.querySelectorAll('div');
        for (const d of divs) {
          const s = d.style.fontSize;
          const sz = parseFloat(s);
          if (sz >= 20 && d.children.length === 0) {
            el._hzCardEnhanced = true;
            el.setAttribute('data-hz-metric-card', '');
            d.setAttribute('data-hz-metric-value', '');
            break;
          }
        }
      }

      // ── Tab enhancer ─────────────────────────────────────────────────────
      // Mark the PC/AI/Workflows tabs for CSS targeting
      const TAB_LABELS = ['pc', 'ai', 'workflows'];
      function enhanceTabs(root) {
        const btns = root.querySelectorAll ? root.querySelectorAll('button') : [];
        for (const btn of btns) {
          if (btn._hzTabEnhanced) continue;
          const txt = (btn.textContent || '').trim().toLowerCase();
          if (TAB_LABELS.includes(txt)) {
            btn._hzTabEnhanced = true;
            btn.setAttribute('data-hz-tab', '');
          }
        }
      }

      // ── Scanner ─────────────────────────────────────────────────────────
      function enhanceScan(root) {
        const el = root.querySelectorAll ? root : document;
        for (const row of el.querySelectorAll('[data-tm-row]')) enhanceRow(row);
        for (const card of el.querySelectorAll('[style*="flex"]')) enhanceMetricCard(card);
        enhanceTabs(el);
      }

      // ── MutationObserver ──────────────────────────────────────────────────
      let pending = false;
      const observer = new MutationObserver(function (mutations) {
        if (pending) return;
        pending = true;
        requestAnimationFrame(function () {
          pending = false;
          for (const m of mutations) {
            for (const node of m.addedNodes) {
              if (node.nodeType === 1) enhanceScan(node);
            }
          }
          // Re-scan all rows in case attributes changed
          enhanceScan(document.body);
        });
      });

      function startEnhancer() {
        observer.observe(document.body, { childList: true, subtree: true });
        enhanceScan(document.body);
        setTimeout(() => enhanceScan(document.body), 600);
        setTimeout(() => enhanceScan(document.body), 1800);
        setTimeout(() => enhanceScan(document.body), 4000);
      }

      if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', startEnhancer);
      } else {
        startEnhancer();
      }
    })();
    </script>

    <!-- ── Chat action interceptor ───────────────────────────────────────────
         Wraps fetch so that when the AI responds with an action (e.g. open a
         companion window), the app acts on it automatically.
    ──────────────────────────────────────────────────────────────────────── -->
    <script>
    (function () {
      const CHAT_PATHS = ['/api/task-manager/chat', '/api/chat'];
      const _origFetch = window.fetch.bind(window);

      function execAction(action) {
        if (!action || action.type !== 'open_window') return;
        const wm = window.horizonsDesktop?.windowManager;
        if (!wm) return;
        // Use the generic open() bridge which accepts any registered window type
        if (typeof wm.open === 'function') {
          wm.open(action.window);
        } else {
          // Fallback to named methods
          const named = {
            tasks: wm.openTasks,
            chat: wm.openChat,
            dev: wm.openDev,
            diagnostics: wm.openDiagnostics,
          };
          const fn = named[action.window];
          if (typeof fn === 'function') fn();
        }
      }

      window.fetch = async function (...args) {
        const res = await _origFetch(...args);
        try {
          const url = typeof args[0] === 'string' ? args[0]
            : (args[0] instanceof Request ? args[0].url : '');
          const isChat = CHAT_PATHS.some(p => url.includes(p));
          if (isChat) {
            const clone = res.clone();
            clone.json().then(data => { if (data?.action) execAction(data.action); }).catch(() => {});
          }
        } catch (_) {}
        return res;
      };
    })();
    </script>
  </body>
</html>
