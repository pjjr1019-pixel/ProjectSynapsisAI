    {
      "id": "typo_heavy",
      "label": "Typo Heavy",
      "description": "Noisy lower-case prompt.",
      "template": "{base}",
      "force_lowercase": true,
      "typo_map": [
        {
          "from": "windows",
          "to": "windwos"
        },
        {
          "from": "settings",
          "to": "setings"
        },
        {
          "from": "program",
          "to": "progrm"
        },
        {
          "from": "manager",
          "to": "manger"
        },
        {
          "from": "feature",
          "to": "featre"
        }
      ]
    },
    {
      "id": "short_blunt",
      "label": "Short Blunt",
      "description": "Minimal wording.",
      "template": "{base}"
    },
    {
      "id": "command_style",
      "label": "Command Style",
      "description": "Ask for an exact command.",
      "template": "Give me the exact command for this: {base}"
    },
    {
      "id": "troubleshooting_panic",
      "label": "Panic",
      "description": "Urgent troubleshooting tone.",
      "template": "Something is wrong and I need help fast. {base}"
    },
    {
      "id": "where_do_i_click",
      "label": "Where Click",
      "description": "UI navigation phrasing.",
      "template": "Where do I click in Windows 11 for this? {base}"
